// ================= RENDER FUNCTION =================
function renderGrid(data, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    data.forEach(item => {
        const btn = document.createElement("div");
        btn.className = "grid-button p-5 rounded-2xl cursor-pointer";

        btn.innerHTML = `
            <div class="flex flex-col items-center text-center gap-3">
                <div class="${item.c} text-white p-4 rounded-xl text-2xl">
                    <i class="${item.i}"></i>
                </div>
                <h3 class="font-bold text-sm md:text-base">${item.t}</h3>
            </div>
        `;

        btn.onclick = () => openModal(item);
        container.appendChild(btn);
    });
}

// ================= MAIN MODAL =================
function openModal(item) {
    document.getElementById("modal").classList.add("modal-active");
    document.body.style.overflow = "hidden";

    document.getElementById("modal-title").innerText = item.t;
    document.getElementById("unit-label").innerText = "Unit " + item.u;
    document.getElementById("modal-content").innerHTML = item.s;
    document.getElementById("nptel-link").href = item.n;

    document.getElementById("modal-header").className =
        "p-6 text-white flex justify-between items-center " + item.c;
}

function closeModal() {
    document.getElementById("modal").classList.remove("modal-active");
    document.body.style.overflow = "auto";
}

// ================= LIVE UPDATES MODAL =================
function openUpdatesModal() {
    document.getElementById("updatesModal").classList.add("modal-active");
    document.body.style.overflow = "hidden";
}

function closeUpdatesModal() {
    document.getElementById("updatesModal").classList.remove("modal-active");
    document.body.style.overflow = "auto";
}

});

document.getElementById("updatesModal").addEventListener("click", function(e){
